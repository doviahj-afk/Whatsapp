{% extends "base.html" %}
{% block title %}Log In - WhatsClone{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>WhatsClone</h1>
    <p class="subtitle">Log in to keep chatting</p>
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required autofocus>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>
    <p class="switch-link">No account? <a href="{{ url_for('register') }}">Sign up</a></p>
  </div>
</div>
{% endblock %}
